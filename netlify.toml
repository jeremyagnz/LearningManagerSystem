[build]
  base    = "frontend"
  command = "npm run build"
  publish = "dist"

# ─── API proxy ────────────────────────────────────────────────────────────────
# Netlify can't run the Node.js backend, so we need to proxy /api/* requests to
# the separately-deployed backend service (e.g. Render, Railway, Heroku).
#
# How to configure:
#   1. Deploy the backend first (see README → "Backend → Render").
#      Using the included render.yaml the service will be named "lms-backend"
#      and its URL will be: https://lms-backend.onrender.com
#   2. In the Netlify dashboard go to:
#        Site configuration → Environment variables
#      and add:
#        BACKEND_URL = https://lms-backend.onrender.com
#        (replace with your actual Render service URL; no trailing slash;
#         do NOT include /api — that is added below)
#   3. Trigger a new Netlify deploy so the variable is picked up.
#
# Without BACKEND_URL set, all /api/* requests will return 404 because Netlify
# has no backend to forward them to.
[[redirects]]
  from   = "/api/*"
  to     = "${BACKEND_URL}/api/:splat"
  status = 200
  force  = true

# ─── SPA fallback ─────────────────────────────────────────────────────────────
# Must be the LAST redirect rule.
# Sends all unmatched paths to index.html so React Router handles them client-side.
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

